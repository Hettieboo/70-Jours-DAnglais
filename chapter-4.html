    {t:'d', s:"Pierrot", en:"What did he tell you?", fr:"Qu'est-ce qu'il t'a dit ?"},
    {t:'d', s:"Hettia", en:"That sometimes you have to be scared, and move forward anyway. I think I'll remember that for a long time.", fr:"Qu'il fallait parfois avoir peur, et avancer quand même. Je crois que je vais m'en souvenir longtemps."},
    {t:'p', en:"Pierrot doesn't say anything, but he squeezes her hand a little tighter. Outside, the sun is starting to set behind the hills.", fr:"Pierrot ne dit rien, mais il serre sa main un peu plus fort. Dehors, le soleil commence à descendre derrière les collines."}
  ];

  const enEl = document.getElementById('sjf-en');
  const frEl = document.getElementById('sjf-fr');

  let englishVoice = null, englishVoiceFemale = null, englishVoiceMale = null;
  function loadVoices() {
    const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    const en = voices.filter(v => v.lang && v.lang.startsWith('en'));
    englishVoice = en.find(v => v.lang === 'en-GB') || en.find(v => v.lang === 'en-US') || en[0] || null;
    const FEMALE = /female|samantha|victoria|karen|moira|tessa|fiona|kate|serena|susan|zira|hazel|allison|ava|kathy|shelley|catherine|joanna|kendra|salli|nicky|amy|emma|joanie|flo|princess/i;
    const MALE = /\bmale\b|daniel|alex|fred|oliver|arthur|ralph|david|george|thomas|aaron|nathan|justin|eric|kevin|matthew|brian|guy(?!\w)|james|mark|gordon|rishi/i;
    englishVoiceFemale = en.find(v => FEMALE.test(v.name)) || null;
    englishVoiceMale = en.find(v => MALE.test(v.name) && !FEMALE.test(v.name)) || null;
  }
  if (window.speechSynthesis) {
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }
  function stripTags(t) { return t.replace(/<[^>]*>/g, ''); }
  function voiceFor(speaker) {
    if (speaker === 'Hettia') return englishVoiceFemale;
    if (speaker === 'Pierrot') return englishVoiceMale;
    return null;
  }
  function speakLine(text, voice, onEnd) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(stripTags(text));
    u.lang = 'en-GB';
    u.voice = voice || englishVoice;
    u.rate = 0.92;
    if (onEnd) u.onend = onEnd;
    window.speechSynthesis.speak(u);
  }

  let playIndex = -1;
  let isPlaying = false;
  const playBtn = document.getElementById('sjf-play');

  function playNext() {
    playIndex++;
    if (playIndex >= story.length || !isPlaying) {
      isPlaying = false;
      document.querySelectorAll('.sjf-playing').forEach(el => el.classList.remove('sjf-playing'));
      if (playBtn) playBtn.textContent = '▶ Play chapter';
      return;
    }
    const block = story[playIndex];
    document.querySelectorAll('.sjf-playing').forEach(el => el.classList.remove('sjf-playing'));
    const lineEl = enEl.children[playIndex];
    if (lineEl) { lineEl.classList.add('sjf-playing'); lineEl.scrollIntoView({behavior:'smooth', block:'center'}); }
    const voice = block.t === 'd' ? voiceFor(block.s) : null;
    speakLine(block.en, voice, playNext);
  }

  if (playBtn) {
    playBtn.onclick = () => {
      if (isPlaying) {
        isPlaying = false;
        window.speechSynthesis.cancel();
        document.querySelectorAll('.sjf-playing').forEach(el => el.classList.remove('sjf-playing'));
        playBtn.textContent = '▶ Play chapter';
      } else {
        isPlaying = true;
        playIndex = -1;
        playBtn.textContent = '■ Stop';
        playNext();
      }
    };
  }

  story.forEach(block => {
    if (block.t === 'p') {
      const pe = document.createElement('p');
      pe.className = 'sjf-p';
      pe.innerHTML = highlight(block.en);
      const btnE = document.createElement('button');
      btnE.className = 'sjf-say';
      btnE.textContent = '🔊';
      btnE.setAttribute('aria-label', 'Listen');
      btnE.onclick = () => speakLine(block.en, null);
      pe.appendChild(btnE);
      enEl.appendChild(pe);
      const pf = document.createElement('p');
      pf.className = 'sjf-p';
      pf.textContent = block.fr;
      frEl.appendChild(pf);
    } else {
      const de = document.createElement('p');
      de.className = 'sjf-d';
      de.innerHTML = '<span class="sjf-speaker">' + block.s + '</span>' + highlight(block.en);
      const btnE = document.createElement('button');
      btnE.className = 'sjf-say';
      btnE.textContent = '🔊';
      btnE.setAttribute('aria-label', 'Listen: ' + block.s);
      btnE.onclick = () => speakLine(block.en, voiceFor(block.s));
      de.appendChild(btnE);
      enEl.appendChild(de);
      const df = document.createElement('p');
      df.className = 'sjf-d';
      df.innerHTML = '<span class="sjf-speaker">' + block.s + '</span>' + block.fr;
      frEl.appendChild(df);
    }
  });

  const grid = document.getElementById('sjf-recap-grid');
  Object.entries(counts)
    .sort((a,b) => b[1].n - a[1].n)
    .forEach(([term, data]) => {
      const row = document.createElement('div');
      row.className = 'sjf-word';
      row.innerHTML = '<span><b>' + term + '</b> — ' + data.fr + '</span><span class="count">×' + data.n + '</span>';
      grid.appendChild(row);
    });

  const dots = document.getElementById('sjf-dots');
  for (let i = 1; i <= 5; i++) {
    const d = document.createElement('div');
    d.className = 'sjf-dot' + (i <= 4 ? ' done' : '');
    dots.appendChild(d);
  }
  const label = document.createElement('span');
  label.className = 'sjf-dots-label';
  label.textContent = 'Chapter 4 of 5';
  dots.appendChild(label);

  window.sjfShowTab = function(tab) {
    document.querySelectorAll('.sjf-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.sjf-pane').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('sjf-' + tab).classList.add('active');
  };
})();
</script>
</body>
</html>
