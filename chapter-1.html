    const placeholders = [];
    let result = text;

        counts[term] = counts[term] || {fr: frHint, n: 0};
        counts[term].n++;
        const idx = placeholders.length;
        placeholders.push('<span class="voc" title="' + frHint + '">' + m + '</span>');
        return "\u0000" + idx + "\u0000";
      });
    }

    {t:'d', s:"Hettia", en:"Thank you, Pierrot. I love you.", fr:"Merci, Pierrot. Je t'aime."},
    {t:'d', s:"Pierrot", en:"I love you too. Welcome home.", fr:"Moi aussi, je t'aime. Bienvenue chez toi."},
    {t:'p', en:"The next morning, Hettia wakes up in Pierrot's house. It's already light out, and she hears noise in the kitchen.", fr:"Le lendemain matin, Hettia se réveille dans la maison de Pierrot. Il fait déjà jour, et elle entend du bruit dans la cuisine."},
    {t:'d', s:"Pierrot", en:"Good morning! Do you want a coffee?", fr:"Bonjour ! Tu veux un café ?"},
    {t:'d', s:"Hettia", en:"Yes, thanks. I really need a coffee this morning!", fr:"Oui, merci. J'ai vraiment besoin d'un café ce matin !"},
    {t:'p', en:"They drink their coffee together, sitting in the small kitchen. Outside, the weather is nice, and the sun is already shining.", fr:"Ils boivent leur café ensemble, assis dans la petite cuisine. Dehors, il fait beau, et le soleil brille déjà."},
    {t:'d', s:"Pierrot", en:"We need to go grocery shopping today. Do you want to come with me?", fr:"On a besoin de faire les courses aujourd'hui. Tu veux venir avec moi ?"},
    {t:'d', s:"Hettia", en:"Yes, gladly! I like discovering the shops around here.", fr:"Oui, avec plaisir ! J'aime bien découvrir les magasins d'ici."},
    {t:'p', en:"They take the car and go to the market. Hettia finds everything different: the fruits, the vegetables, even the smells. But she finds it really interesting.", fr:"Ils prennent la voiture et vont au marché. Hettia trouve tout différent : les fruits, les légumes, même les odeurs. Mais elle trouve ça vraiment intéressant."},
    {t:'d', s:"Pierrot", en:"So, what do you think of the French market?", fr:"Alors, qu'est-ce que tu penses du marché français ?"},
    {t:'d', s:"Hettia", en:"I love it! It's very different from the markets back home, but I think it's great.", fr:"J'adore ! C'est très différent des marchés chez moi, mais je trouve ça génial."},
    {t:'p', en:"After the shopping, they head home. Hettia already starts to feel a little more at home. She thinks: \"Maybe seventy days isn't so long after all.\"", fr:"Après les courses, ils rentrent à la maison. Hettia commence déjà à se sentir un peu plus chez elle. Elle pense : « Peut-être que soixante-dix jours, ce n'est pas si long. »"},
    {t:'p', en:"It's the first day of a long story — seventy days to learn to speak, to understand, and to love a new family.", fr:"C'est le premier jour d'une longue histoire — soixante-dix jours pour apprendre à parler, à comprendre, et à aimer une nouvelle famille."}
  ]  ;

  const enEl = document.getElementById('sjf-en');
  const frEl = document.getElementById('sjf-fr');

  story.forEach(block => {
    if (block.t === 'p') {
      const pe = document.createElement('p');
      pe.className = 'sjf-p';
      pe.innerHTML = highlight(block.en);
      enEl.appendChild(pe);
      const pf = document.createElement('p');
      pf.className = 'sjf-p';
      pf.textContent = block.fr;
      frEl.appendChild(pf);
    } else {
      const de = document.createElement('p');
      de.className = 'sjf-d';
      de.innerHTML = '<span class="sjf-speaker">' + block.s + '</span>' + highlight(block.en);
      enEl.appendChild(de);
      const df = document.createElement('p');
      df.className = 'sjf-d';
      df.innerHTML = '<span class="sjf-speaker">' + block.s + '</span>' + block.fr;
      frEl.appendChild(df);
    }
  });

  const grid = document.getElementById('sjf-recap-grid');
  Object.entries(counts)
    .sort((a,b) => b[1].n - a[1].n)
    .forEach(([term, data]) => {
      const row = document.createElement('div');
      row.className = 'sjf-word';
      row.innerHTML = '<span><b>' + term + '</b> — ' + data.fr + '</span><span class="count">×' + data.n + '</span>';
      grid.appendChild(row);
    });

  const dots = document.getElementById('sjf-dots');
  for (let i = 1; i <= 5; i++) {
    const d = document.createElement('div');
    d.className = 'sjf-dot' + (i === 1 ? ' done' : '');
    dots.appendChild(d);
  }
  const label = document.createElement('span');
  label.className = 'sjf-dots-label';
  label.textContent = 'Chapter 1 of 5';
  dots.appendChild(label);

  window.sjfShowTab = function(tab) {
    document.querySelectorAll('.sjf-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.sjf-pane').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('sjf-' + tab).classList.add('active');
  };
})();
</script>
</body>
</html>
